server {
    listen 80;
    listen [::]:80;
    server_name ms.eto.ccwu.cc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ms.eto.ccwu.cc;

    ssl_certificate     /etc/letsencrypt/live/ms.eto.ccwu.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ms.eto.ccwu.cc/privkey.pem;

    # Rate limiting — zones defined in nginx-main.conf
    limit_conn conn_limit 50;
    limit_req zone=general burst=60 nodelay;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
